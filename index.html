<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794') center/cover no-repeat;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 360px;
      padding: 35px 25px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      color: white;
      text-align: center;
    }

    .container h2 {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border: none;
      outline: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.92);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    #loginMsg, #fpMsg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎓 Online Exam Login</h2>

    <div id="loginPage">
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p id="loginMsg"></p>
    </div>

    <div id="fpPage" class="hidden">
      <h3>👉 Fingerprint Verification</h3>
      <button onclick="fingerprint()">Scan Fingerprint</button>
      <p id="fpMsg"></p>
    </div>
  </div>

  <script>
    let users = {
      student1: { password: "pass1", fingerprint: "fp1" },
      student2: { password: "pass2", fingerprint: "fp2" },
      student3: { password: "pass3", fingerprint: "fp3" },
      student4: { password: "pass4", fingerprint: "fp4" },
      student5: { password: "pass5", fingerprint: "fp5" },
      student6: { password: "pass6", fingerprint: "fp6" },
      student7: { password: "pass7", fingerprint: "fp7" },
      student8: { password: "pass8", fingerprint: "fp8" },
      student9: { password: "pass9", fingerprint: "fp9" },
      student10: { password: "pass10", fingerprint: "fp10" },
      admin: { password: "admin123", fingerprint: "fp999" }
    };

    let currentUser = "";

    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (users[u] && users[u].password === p) {
        currentUser = u;
        loginMsg.style.color = "lightgreen";
        loginMsg.innerText = "Login Successful ✅";
        setTimeout(() => {
          loginPage.classList.add("hidden");
          fpPage.classList.remove("hidden");
        }, 800);
      } else {
        loginMsg.style.color = "red";
        loginMsg.innerText = "Invalid Username or Password ❌";
      }
    }

    function fingerprint() {
      let fp = prompt("Enter Fingerprint ID:");
      if (users[currentUser] && users[currentUser].fingerprint === fp) {
        fpMsg.style.color = "lightgreen";
        fpMsg.innerText = "Fingerprint Successful ✅";
        window.location.href = "admin.html";
      } else {
        fpMsg.style.color = "red";
        fpMsg.innerText = "Fingerprint Failed ❌";
      }
    }
  </script>
</body>
</html>
