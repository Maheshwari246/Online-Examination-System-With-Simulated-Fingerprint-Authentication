
<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794') no-repeat center/cover;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .books-line {
      position: absolute;
      top: 20px;
      left: -20%;
      width: 200%;
      font-size: 42px;
      opacity: 0.25;
      letter-spacing: 12px;
      transform: rotate(45deg);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 320px;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      color: white;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .hidden {
      display: none;
    }

    #loginMsg, #fpMsg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="books-line">
    📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚 📚
  </div>

  <div class="container">
    <h2>🎓 Online Exam Login</h2>

    <div id="loginPage">
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p id="loginMsg"></p>
    </div>

    <div id="fpPage" class="hidden">
      <h3>👉 Fingerprint Verification</h3>
      <button onclick="fingerprint()">Scan Fingerprint</button>
      <p id="fpMsg"></p>
    </div>
  </div>

  <script>
    let users = {
      student1: { password: "pass1", fingerprint: "fp1" },
      student2: { password: "pass2", fingerprint: "fp2" },
      student3: { password: "pass3", fingerprint: "fp3" },
      student4: { password: "pass4", fingerprint: "fp4" },
      student5: { password: "pass5", fingerprint: "fp5" },
      student6: { password: "pass6", fingerprint: "fp6" },
      student7: { password: "pass7", fingerprint: "fp7" },
      student8: { password: "pass8", fingerprint: "fp8" },
      student9: { password: "pass9", fingerprint: "fp9" },
      student10: { password: "pass10", fingerprint: "fp10" },
      admin: { password: "admin123", fingerprint: "fp999" }
    };

    let currentUser = "";

    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (users[u] && users[u].password === p) {
        currentUser = u;
        let msg = document.getElementById("loginMsg");
        msg.style.color = "lightgreen";
        msg.innerText = "Login Successful ✅";

        setTimeout(() => {
          document.getElementById("loginPage").classList.add("hidden");
          document.getElementById("fpPage").classList.remove("hidden");
        }, 1000);
      } else {
        let msg = document.getElementById("loginMsg");
        msg.style.color = "red";
        msg.innerText = "Invalid Username or Password ❌";
      }
    }

    function fingerprint() {
      let fp = prompt("Enter Fingerprint ID:");
      if (users[currentUser].fingerprint === fp) {
        let msg = document.getElementById("fpMsg");
        msg.style.color = "lightgreen";
        msg.innerText = "Fingerprint Successful ✅";
        window.location.href = "admin.html";
      } else {
        let msg = document.getElementById("fpMsg");
        msg.style.color = "red";
        msg.innerText = "Fingerprint Failed ❌";
      }
    }
  </script>
</body>
</html>
