‌‌<!DOCTYPE html>

<html>  
<head>  
<title>Admin Panel</title>  <style>  
body {  
  font-family: 'Poppins', Arial;  
  padding: 20px;  
  margin: 0;  
  
  display: flex;  
  flex-direction: column;  
  align-items: center;  
  
  background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794') no-repeat center/cover;  
}  
  
/* DARK OVERLAY */  
body::before {  
  content: "";  
  position: fixed;  
  top: 0;  
  left: 0;  
  width: 100%;  
  height: 100%;  
  background: rgba(0,0,0,0.6);  
  z-index: -1;  
}  
  
/* BOX */  
.box {  
  width: 90%;  
  max-width: 500px;  
  padding: 20px;  
  margin-top: 20px;  
  
  background: rgba(255, 255, 255, 0.15);  
  backdrop-filter: blur(12px);  
  
  border-radius: 15px;  
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);  
  color: white;  
}  
  
h2 {  
  text-align: center;  
  color: white;  
}  
  
h3 {  
  margin-bottom: 10px;  
}  
  
/* INPUTS */  
input {  
  width: 100%;  
  padding: 10px;  
  border: none;  
  border-radius: 8px;  
  outline: none;  
  margin-bottom: 10px;  
  
  background: rgba(255,255,255,0.2);  
  color: white;  
}  
  
input::placeholder {  
  color: #ddd;  
}  
  
/* BUTTON */  
button {  
  width: 100%;  
  padding: 10px;  
  border: none;  
  border-radius: 8px;  
  
  background: #ff9800;  
  color: white;  
  cursor: pointer;  
  transition: 0.3s;  
}  
  
button:hover {  
  background: #e68900;  
  transform: scale(1.05);  
}  
  
/* DELETE BUTTON */  
.delete-btn {  
  background: #e53935;  
}  
  
.delete-btn:hover {  
  background: #c62828;  
}  
  
/* QUESTION CARD */  
.qcard {  
  margin-bottom: 15px;  
  padding: 10px;  
  border-radius: 10px;  
  background: rgba(0,0,0,0.4);  
}  
</style>  </head>  <body>  <h2>Admin Panel</h2>  <div class="box">  
<h3>Add Question</h3>  <input id="q" placeholder="Question">  
<input id="o1" placeholder="Option A">  
<input id="o2" placeholder="Option B">  
<input id="o3" placeholder="Option C">  
<input id="o4" placeholder="Option D">  
<input id="ans" placeholder="Correct Answer (A/B/C/D)">  <button onclick="addQ()">Add Question</button>

</div>  <div class="box">  
<h3>Questions List</h3>  
<div id="list"></div>  
</div>  <!-- Student Management Start -->  <div class="box">  
<h3>Student Management</h3>  <table style="width:100%; border-collapse:collapse; color:white; text-align:center;" border="1">  <tr>  
<th>Name</th>  
<th>Password</th>  
<th>Fingerprint ID</th>  
</tr>  <tr><td>Student1</td><td>pass1</td><td>fp1</td></tr>  
<tr><td>Student2</td><td>pass2</td><td>fp2</td></tr>  
<tr><td>Student3</td><td>pass3</td><td>fp3</td></tr>  
<tr><td>Student4</td><td>pass4</td><td>fp4</td></tr>  
<tr><td>Student5</td><td>pass5</td><td>fp5</td></tr>  
<tr><td>Student6</td><td>pass6</td><td>fp6</td></tr>  
<tr><td>Student7</td><td>pass7</td><td>fp7</td></tr>  
<tr><td>Student8</td><td>pass8</td><td>fp8</td></tr>  
<tr><td>Student9</td><td>pass9</td><td>fp9</td></tr>  
<tr><td>Student10</td><td>pass10</td><td>fp10</td></tr>  </table>  
</div>  
<!-- Student Management End -->  <script>  
  
let questions = JSON.parse(localStorage.getItem("questions")) || [];  
  
function addQ(){  
  let q = document.getElementById("q").value.trim();  
  let o1 = document.getElementById("o1").value.trim();  
  let o2 = document.getElementById("o2").value.trim();  
  let o3 = document.getElementById("o3").value.trim();  
  let o4 = document.getElementById("o4").value.trim();  
  let ans = document.getElementById("ans").value.trim().toUpperCase();  
  
  if(!q || !o1 || !o2 || !o3 || !o4 || !ans){  
    alert("Fill all fields!");  
    return;  
  }  
  
  if(!["A","B","C","D"].includes(ans)){  
    alert("Answer must be A / B / C / D");  
    return;  
  }  
  
  questions.push({  
    q: q,  
    o: {A:o1, B:o2, C:o3, D:o4},  
    a: ans  
  });  
  
  localStorage.setItem("questions", JSON.stringify(questions));  
  
  alert("Question Added!");  
  
  clearFields();  
  show();  
}  
  
function clearFields(){  
  document.getElementById("q").value = "";  
  document.getElementById("o1").value = "";  
  document.getElementById("o2").value = "";  
  document.getElementById("o3").value = "";  
  document.getElementById("o4").value = "";  
  document.getElementById("ans").value = "";  
}  
  
function deleteQ(i){  
  questions.splice(i,1);  
  localStorage.setItem("questions", JSON.stringify(questions));  
  show();  
}  
  
function show(){  
  let html = "";  
  
  questions.forEach((q,i)=>{  
    html += `  
      <div class="qcard">  
        <b>Q${i+1}. ${q.q}</b><br>  
        A) ${q.o.A} <br>  
        B) ${q.o.B} <br>  
        C) ${q.o.C} <br>  
        D) ${q.o.D} <br><br>  
        <b>Answer: ${q.a}</b><br><br>  
        <button class="delete-btn" onclick="deleteQ(${i})">Delete</button>  
      </div>  
    `;  
  });  
  
  document.getElementById("list").innerHTML = html;  
}  
  
show();  
  if (loginSuccess == true) {
    window.location.href = "admin.html";

    setTimeout(() => {
        window.location.href = "exam.html";
    }, 2000);
  }

</script>  </body>  
</html>
